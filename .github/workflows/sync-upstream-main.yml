name: Sync fork main with upstream

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Fast-forward main from infiniflow/ragflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api -X POST "repos/${GITHUB_REPOSITORY}/merge-upstream" -f branch=main
